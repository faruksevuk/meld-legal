  <h1>Delete Your MELD Account</h1>
  <p>To delete your account and all associated data:</p>
  <ol>
    <li>Open the MELD app</li>
    <li>Go to <strong>Profile</strong></li>
    <li>Tap <strong>Delete Account</strong></li>
    <li>Type DELETE to confirm</li>
  </ol>
  <p>Alternatively, email us at 
    <a href="mailto:meld@faruksevuk.com">meld@faruksevuk.com</a>
